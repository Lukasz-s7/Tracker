    function updateClock() {
  const now = new Date();

  const days = [
    "NIEDZIELA",
    "PONIEDZIAŁEK",
    "WTOREK",
    "ŚRODA",
    "CZWARTEK",
    "PIĄTEK",
    "SOBOTA"
  ];

  const dayName = days[now.getDay()];

  const day = String(now.getDate()).padStart(2, "0");
  const month = String(now.getMonth() + 1).padStart(2, "0");
  const year = now.getFullYear();

  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("topbar").innerText =
    `${dayName} | ${day}.${month}.${year} | ${hours}:${minutes}`;
}

function getToday() {

// inicjalizacja przy pierwszym uruchomieniu
function initDateStorage() {
  const stored = localStorage.getItem("lastDate");
  const today = getToday();

  if (!stored) {
    localStorage.setItem("lastDate", today);
  }
}

// sprawdzanie zmiany dnia
function checkDateChange() {
  const today = getToday();
  const stored = localStorage.getItem("lastDate");

  if (stored !== today) {
    localStorage.setItem("lastDate", today);
    location.reload(); // reset UI
  }
}

    function getColor(percent) {
  if (percent <= 20) return "#e74c3c";      // czerwony
  if (percent <= 40) return "#e67e22";      // pomarańczowy
  if (percent <= 60) return "#f1c40f";      // żółty
  if (percent <= 80) return "#2ecc71";      // jasno zielony
  return "#27ae60";                         // zielony
}

    function countHabit(data, habit) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  let count = 0;

  data.forEach(row => {
    if (!row.date) return;

    const d = new Date(row.date);

    if (d.getFullYear() === year && d.getMonth() === month) {
      if (String(row[habit]).toLowerCase() === "true") {
        count++;
      }
    }
  });

  return count;
}

    function setProgress(id, percent) {
  const el = document.getElementById(id);

  if (!el) {
    console.log("Brak elementu:", id);
    return;
  }

  el.style.width = percent + "%";
  el.style.backgroundColor = getColor(percent);
  el.innerText = percent + "%";
}

    function calculateProgress(data, habit, target) {
  if (!target) return 0;

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  let count = 0;

  data.forEach(row => {
    if (!row.date) return;

    const d = new Date(row.date);

    if (d.getFullYear() === year && d.getMonth() === month) {
      if (String(row[habit]).toLowerCase() === "true") {
        count++;
      }
    }
  });

  return Math.min(100, Math.round((count / target) * 100));
}

    async function loadCalendar() {

  const res = await fetch(url);
  return await res.json();
}

    function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function filterTodayEvents(events) {
  const today = new Date().toISOString().slice(0, 10);

  return events.filter(e => {
    const start = String(e["Data rozpoczęcia"]).slice(0, 10);
    const end = String(e["Data zakończenia"]).slice(0, 10);

    return start <= today && end >= today;
  });
}

    function formatEventTime(startRaw, endRaw) {
  const start = new Date(startRaw);
  const end = new Date(endRaw);

  // 🔥 DETEKCJA "CAŁY DZIEŃ"
  const isAllDay =
    start.getUTCHours() === 0 &&
    end.getUTCHours() === 0 &&
    (end - start) >= 24 * 60 * 60 * 1000;

  if (isAllDay) {
    return "cały dzień";
  }

  // 🔥 FORMAT GODZIN (PL, lokalny czas)
  const format = d =>
    d.toLocaleTimeString("pl-PL", {
      hour: "2-digit",
      minute: "2-digit"
    });

  return `${format(start)} - ${format(end)}`;
}
    
function renderCalendar(events) {
  const box = document.getElementById("calendarBox");
  if (!box) return;

  box.innerHTML = "";

  if (!events || events.length === 0) {
    box.innerHTML = "<div class='calendar-item'>Brak wydarzeń</div>";
    return;
  }

  events.forEach(e => {
    const el = document.createElement("div");
    el.className = "calendar-item";

    const startRaw = String(e["Data rozpoczęcia"] || "");
    const endRaw = String(e["Data zakończenia"] || "");
    const title = e["Tytuł"] || "";
    const label = formatEventTime(startRaw, endRaw);

    if (startRaw.includes(" ")) {
      const startTime = startRaw.split(" ")[1]?.slice(0,5) || "";
      const endTime = endRaw.split(" ")[1]?.slice(0,5) || "";

      label = `${startTime}${endTime ? "–" + endTime : ""}`;
    } else {
      label = startRaw;
    }

    el.innerHTML = `
  <span class="calendar-time">${label}</span>
  ${title}
`;
    
    box.appendChild(el);
  });
}

    async function initCalendar() {

      todayEvents.sort((a, b) => {
  const aStart = new Date(a["Data rozpoczęcia"]);
  const bStart = new Date(b["Data rozpoczęcia"]);
  return aStart - bStart;
});

console.log("CALENDAR RAW:", data);
console.log("TODAY EVENTS:", todayEvents);

  renderCalendar(todayEvents);
}

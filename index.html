<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .topbar {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      font-size: 18px;
      text-align: center;
      position: sticky;
      top: 0;
    }
  </style>
</head>
<body>

  <div class="topbar" id="dateBar"></div>

  <script>
    function getPolishDayName(dayIndex) {
      const days = [
        "niedziela",
        "poniedziałek",
        "wtorek",
        "środa",
        "czwartek",
        "piątek",
        "sobota"
      ];
      return days[dayIndex];
    }

    function formatDateTime() {
      const now = new Date();

      const dayName = getPolishDayName(now.getDay());

      const day = String(now.getDate()).padStart(2, "0");
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = now.getFullYear();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      return `${dayName}, ${day}.${month}.${year} • ${hours}:${minutes}`;
    }

    function updateClock() {
      document.getElementById("dateBar").innerText = formatDateTime();
    }

    // pierwsze ustawienie
    updateClock();

    // odświeżanie dokładnie na początku każdej minuty
    const now = new Date();
    const secondsToNextMinute = 60 - now.getSeconds();

    setTimeout(() => {
      updateClock();
      setInterval(updateClock, 60000);
    }, secondsToNextMinute * 1000);
  </script>

</body>
</html>

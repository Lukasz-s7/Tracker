<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker</title>

 
  <style>

* {
  box-sizing: border-box;
}
    
html, body {
  height: 100%;
}

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
     background-color: #2c3e50;
    color: white;

    padding: 15px;
    font-size: 22px;
  font-weight: bold;
  text-transform: uppercase;

  display: flex;
  justify-content: center;
  align-items: center;

  position: sticky;
  top: 0;
      white-space: nowrap;
    }

    .date {
      font-weight: bold;
      font-size: 16px;
    }

    .time {
      font-weight: bold;
      font-size: 20px;
    }

    /* PANELS CONTAINER */

   .container {
   display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 10px;
  flex: 1;
 }

    /* SINGLE PANEL */
    .panel {
      background-color: white;
      border-radius: 12px;
  padding: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  display: flex;
  flex-direction: column;
    }

    .panel-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

.bottom-nav {
  display: flex;
  justify-content: space-around;
  align-items: center;

  background-color: #e0e0e0;
  margin: 10px;
  padding: 10px;

  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.bottom-nav button {
    flex: 1;
  height: 50px;

  margin: 0 5px; /* odstęp między przyciskami */

  background-color: white; /* biały */
  border: 2px solid black; /* czarna krawędź */
  border-radius: 8px;

  font-weight: bold;
  text-transform: uppercase;

  display: flex;
  justify-content: center;
  align-items: center;

  cursor: pointer;
}

  .bottom-nav button.active {
  background-color: #2c3e50;
    color: white;
  border-radius: 8px;
}

    .panel-title-center {
  font-weight: bold;
  text-align: center;
  margin-bottom: 16px;
  font-size: 20px;
}

.section {
  margin-bottom: 16px;
}

.section-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.section label {
  display: block;
  margin-bottom: 6px;
}

    .list-row {
  display: flex;
  justify-content: space-between;
  align-items: center;

  margin-bottom: 6px;
}

.list-row span {
  font-size: 14px;
}

.list-row input {
  width: 60px;
  padding: 4px;

  border: 1px solid #ccc;
  border-radius: 6px;

  text-align: center;
}

@media (max-width: 768px) {
  .container {
    display: flex !important;          /* nadpisuje grid */
    flex-direction: row;
    overflow-x: auto;

    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;

    gap: 0;                            /* usuwa odstępy z grid */
    padding: 0;
  }

  .panel {
    flex: 0 0 100%;                    /* każdy panel = cały ekran */
    max-width: 100%;

    scroll-snap-align: start;

    padding: 15px;
    margin: 0;                         /* usuń marginesy */
    border-radius: 0;                  /* opcjonalnie: full screen look */
  }
}

.hidden {
  display: none !important;
}
    
  </style>
</head>


<body>

  <!-- TOP BAR -->
  <div class="topbar" id="topbar"></div>

  <!-- PANELS -->
  <div id="dayView" class="container">

   <div class="panel">
  <div class="panel-title-center">HABITUM</div>

  <!-- FACTUM -->

    <label><input type="checkbox" id="RLT"> RLT</label>
  </div>

  <!-- SOMA -->
  <div class="section">
    <div class="section-title">Soma</div>

    <label><input type="checkbox" id="BHB"> BHB</label>
    <label><input type="checkbox" id="WND"> WND</label>
    <label><input type="checkbox" id="CRB"> CRB</label>

  </div>
</div>

    <div class="panel">
      <div class="panel-title-center">EXECUTIO</div>
    </div>

    <div class="panel">
      <div class="panel-title-center">CONSILIA</div>
    </div>

    <div class="panel">
  <div class="panel-title-center">RESOLUTIO</div>

  <!-- LISTA 1 -->
  <div class="section">
    <div class="list-row"><span>BGS</span><input type="number" id="BGS"></div>
    <div class="list-row"><span>BTS</span><input type="number" id="BTS"></div>

    <div class="list-row"><span>RNN</span><input type="number" id="RNN"></div>

  <div style="margin-top: 16px;"></div>

  <!-- CULTURA -->
  <div class="section">

    <div class="list-row"><span>Książki</span><input type="number" id="KSIAZKI"></div>
    <div class="list-row"><span>Filmy</span><input type="number" id="FILMY"></div>
    <div class="list-row"><span>Teatr</span><input type="number" id="TEATR"></div>

</div>

  </div>

  <div id="monthView" class="container hidden">
  
  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 1</div>
  </div>

  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 2</div>
  </div>

  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 3</div>
  </div>

  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 4</div>

</div>

  <div class="bottom-nav">
  <button id="dayBtn" class="active">DZIEŃ</button>
  <button id="monthBtn">MIESIĄC</button>
  <button>ROK</button>

  <script>
    function getPolishDayName(dayIndex) {
      const days = [
        "NIEDZIELA",
        "PONIEDZIAŁEK",
        "WTOREK",
        "ŚRODA",
        "CZWARTEK",
        "PIĄTEK",
        "SOBOTA"
      ];
      return days[dayIndex];
    }

    function updateClock() {
  const now = new Date();

  const days = [
    "NIEDZIELA",
    "PONIEDZIAŁEK",
    "WTOREK",
    "ŚRODA",
    "CZWARTEK",
    "PIĄTEK",
    "SOBOTA"
  ];

  const dayName = days[now.getDay()];

  const day = String(now.getDate()).padStart(2, "0");
  const month = String(now.getMonth() + 1).padStart(2, "0");
  const year = now.getFullYear();

  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("topbar").innerText =
    `${dayName} | ${day}.${month}.${year} | ${hours}:${minutes}`;
}

    updateClock();

    const now = new Date();
    const secondsToNextMinute = 60 - now.getSeconds();

    setTimeout(() => {
      updateClock();
      setInterval(updateClock, 60000);
    }, secondsToNextMinute * 1000);

const dayBtn = document.getElementById("dayBtn");
const monthBtn = document.getElementById("monthBtn");

const dayView = document.getElementById("dayView");
const monthView = document.getElementById("monthView");

dayBtn.addEventListener("click", () => {
  dayView.classList.remove("hidden");
  monthView.classList.add("hidden");

  dayBtn.classList.add("active");
  monthBtn.classList.remove("active");
});

monthBtn.addEventListener("click", () => {
  dayView.classList.add("hidden");
  monthView.classList.remove("hidden");

  monthBtn.classList.add("active");
  dayBtn.classList.remove("active");
});

dayView.classList.remove("hidden");
monthView.classList.add("hidden");

    


    async function loadData() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbzXICOb9VnflswkH9HgHP7QW_U7mCJTlrbwEObbQ6cfUZNuCwuNv-i6YCNWaVL133SP/exec");
  return await res.json();
}

    
    function getToday() {
  const now = new Date();
  return now.toISOString().slice(0, 10); // YYYY-MM-DD
}

    async function init() {
  const today = getToday();
  const data = await loadData();

  const todayRow = data.find(r => r[0] === today);

  if (todayRow) {
    fillUI(todayRow);
  } else {
    clearUI();
  }
}

    function getToday() {
  const now = new Date();
  return now.toISOString().slice(0, 10);
}

function saveCurrentDay() {
  const payload = {
    date: getToday(),

    MRT: document.getElementById("MRT")?.checked || false,
    ERT: document.getElementById("ERT")?.checked || false,
    TKS: document.getElementById("TKS")?.checked || false,
    BKS: document.getElementById("BKS")?.checked || false,
    DVP: document.getElementById("DVP")?.checked || false,
    KDS: document.getElementById("KDS")?.checked || false,
    RLT: document.getElementById("RLT")?.checked || false,
    BHB: document.getElementById("BHB")?.checked || false,
    WND: document.getElementById("WND")?.checked || false,
    CRB: document.getElementById("CRB")?.checked || false,
    WKT: document.getElementById("WKT")?.checked || false,
    BGS: getNumber("BGS"),
    BTS: getNumber("BTS"),
    ICS: getNumber("ICS"),
    RNN: getNumber("RNN"),
    BCG: getNumber("BCG"),
    PGN: getNumber("PGN"),
    SPI: getNumber("SPI"),

    KSIAZKI: getNumber("KSIAZKI"),
    FILMY: getNumber("FILMY"),
    TEATR: getNumber("TEATR"),
    GRY: getNumber("GRY"),
    MUZYKA: getNumber("MUZYKA"),
    KONCERTY: getNumber("KONCERTY"),
  };

  console.log("PAYLOAD:", payload);

  const params = new URLSearchParams();

  Object.keys(payload).forEach(key => {
    params.append(key, payload[key]);
  });

  const url = "https://script.google.com/macros/s/AKfycbzXICOb9VnflswkH9HgHP7QW_U7mCJTlrbwEObbQ6cfUZNuCwuNv-i6YCNWaVL133SP/exec"
    + "?" + params.toString();

  console.log("URL:", url);

  new Image().src = url;
}

// 🔥 eventy dla checkboxów
document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener("change", saveCurrentDay);
});



    // ===== RESET DNIA O PÓŁNOCY =====

// zwraca dzisiejszą datę w formacie YYYY-MM-DD
function getToday() {
  return new Date().toISOString().slice(0, 10);
}

// inicjalizacja przy pierwszym uruchomieniu
function initDateStorage() {
  const stored = localStorage.getItem("lastDate");
  const today = getToday();

  if (!stored) {
    localStorage.setItem("lastDate", today);
  }
}

// sprawdzanie zmiany dnia
function checkDateChange() {
  const today = getToday();
  const stored = localStorage.getItem("lastDate");

  if (stored !== today) {
    localStorage.setItem("lastDate", today);
    location.reload(); // reset UI
  }
}

// uruchomienie
initDateStorage();

// sprawdzanie co minutę
setInterval(checkDateChange, 60000);

    function getNumber(id) {
  const el = document.getElementById(id);
  return el && el.value !== "" ? Number(el.value) : 0;
}

document.querySelectorAll('input[type="number"]').forEach(inp => {
  inp.addEventListener("change", saveCurrentDay);
});

    
  </script>

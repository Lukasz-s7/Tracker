<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker</title>

 
  <style>

html, body {
  height: 100%;
}

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
     background-color: #2c3e50;
    color: white;

    padding: 15px;
    font-size: 22px;
  font-weight: bold;
  text-transform: uppercase;

  display: flex;
  justify-content: center;
  align-items: center;

  position: sticky;
  top: 0;
      white-space: nowrap;
    }

    .date {
      font-weight: bold;
      font-size: 16px;
    }

    .time {
      font-weight: bold;
      font-size: 20px;
    }

    /* PANELS CONTAINER */

   .container {
   display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 10px;
  flex: 1;
 }

    /* SINGLE PANEL */
    .panel {
      background-color: white;
      border-radius: 12px;
  padding: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  display: flex;
  flex-direction: column;
    }

    .panel-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

.bottom-nav {
  display: flex;
  justify-content: space-around;
  align-items: center;

  background-color: #e0e0e0;
  margin: 10px;
  padding: 10px;

  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.bottom-nav button {
    flex: 1;
  height: 50px;

  margin: 0 5px; /* odstęp między przyciskami */

  background-color: white; /* biały */
  border: 2px solid black; /* czarna krawędź */
  border-radius: 8px;

  font-weight: bold;
  text-transform: uppercase;

  display: flex;
  justify-content: center;
  align-items: center;

  cursor: pointer;
}

  .bottom-nav button.active {
  background-color: #2c3e50;
    color: white;
  border-radius: 8px;
}

    .panel-title-center {
  font-weight: bold;
  text-align: center;
  margin-bottom: 16px;
  font-size: 20px;
}

.section {
  margin-bottom: 16px;
}

.section-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.section label {
  display: block;
  margin-bottom: 6px;
}

@media (max-width: 768px) {
  .container {
    display: flex !important;          /* nadpisuje grid */
    flex-direction: row;
    overflow-x: auto;

    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;

    gap: 0;                            /* usuwa odstępy z grid */
    padding: 0;
  }

  .panel {
    flex: 0 0 100%;                    /* każdy panel = cały ekran */
    min-width: 100%;

    scroll-snap-align: start;

    margin: 0;                         /* usuń marginesy */
    border-radius: 0;                  /* opcjonalnie: full screen look */
  }
}

.hidden {
  display: none !important;
}
    
  </style>
</head>


<body>

  <!-- TOP BAR -->
  <div class="topbar" id="topbar"></div>

  <!-- PANELS -->
  <div id="dayView" class="container">

   <div class="panel">
  <div class="panel-title-center">HABITUM</div>

  <div class="section">
    <div class="section-title">Factum</div>
    <label><input type="checkbox"> MRT</label>
    <label><input type="checkbox"> ERT</label>
    <label><input type="checkbox"> TKS</label>
  </div>

  <div class="section">
    <div class="section-title">Psyche</div>
    <label><input type="checkbox"> BKS</label>
    <label><input type="checkbox"> DVP</label>
    <label><input type="checkbox"> KDS</label>
    <label><input type="checkbox"> RLT</label>
  </div>

  <div class="section">
    <div class="section-title">Soma</div>
    <label><input type="checkbox"> BHB</label>
    <label><input type="checkbox"> WND</label>
    <label><input type="checkbox"> CRB</label>
    <label><input type="checkbox"> WKT</label>
  </div>
</div>

    <div class="panel">
      <div class="panel-title-center">EXECUTIO</div>
    </div>

    <div class="panel">
      <div class="panel-title">Panel 3</div>
    </div>

    <div class="panel">
      <div class="panel-title">Panel 4</div>
    </div>

  </div>

  <div id="monthView" class="container hidden">
  
  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 1</div>
  </div>

  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 2</div>
  </div>

  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 3</div>
  </div>

  <div class="panel">
    <div class="panel-title">Miesiąc - Panel 4</div>
  </div>

</div>

  <div class="bottom-nav">
  <button id="dayBtn" class="active">DZIEŃ</button>
  <button id="monthBtn">MIESIĄC</button>
  <button>ROK</button>
  <button>ŻYCIE</button>
</div>

  <script>
    function getPolishDayName(dayIndex) {
      const days = [
        "NIEDZIELA",
        "PONIEDZIAŁEK",
        "WTOREK",
        "ŚRODA",
        "CZWARTEK",
        "PIĄTEK",
        "SOBOTA"
      ];
      return days[dayIndex];
    }

    function updateClock() {
  const now = new Date();

  const days = [
    "NIEDZIELA",
    "PONIEDZIAŁEK",
    "WTOREK",
    "ŚRODA",
    "CZWARTEK",
    "PIĄTEK",
    "SOBOTA"
  ];

  const dayName = days[now.getDay()];

  const day = String(now.getDate()).padStart(2, "0");
  const month = String(now.getMonth() + 1).padStart(2, "0");
  const year = now.getFullYear();

  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("topbar").innerText =
    `${dayName} | ${day}.${month}.${year} | ${hours}:${minutes}`;
}

    updateClock();

    const now = new Date();
    const secondsToNextMinute = 60 - now.getSeconds();

    setTimeout(() => {
      updateClock();
      setInterval(updateClock, 60000);
    }, secondsToNextMinute * 1000);

const dayBtn = document.getElementById("dayBtn");
const monthBtn = document.getElementById("monthBtn");

const dayView = document.getElementById("dayView");
const monthView = document.getElementById("monthView");

dayBtn.addEventListener("click", () => {
  dayView.classList.remove("hidden");
  monthView.classList.add("hidden");

  dayBtn.classList.add("active");
  monthBtn.classList.remove("active");
});

monthBtn.addEventListener("click", () => {
  dayView.classList.add("hidden");
  monthView.classList.remove("hidden");

  monthBtn.classList.add("active");
  dayBtn.classList.remove("active");
});

dayView.classList.remove("hidden");
monthView.classList.add("hidden");
    
  </script>

</body>
</html>

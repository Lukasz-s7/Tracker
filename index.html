<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;

      background-color: #e0e0e0;
      color: #333;

      padding: 15px 20px;
      margin: 10px;

      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);

      position: sticky;
      top: 0;
    }

    .date {
      font-weight: bold;
      font-size: 16px;
    }

    .time {
      font-weight: bold;
      font-size: 20px;
    }

    /* PANELS CONTAINER */
    
    .container {
  display: flex;
  gap: 12px;
  padding: 10px;
  flex-wrap: wrap;
}

    /* SINGLE PANEL */
    .panel {
      background-color: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      min-height: 80px;
      flex: 1 1 calc(25% - 12px);
    }

    .panel-title {
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="date" id="date"></div>
    <div class="time" id="time"></div>
  </div>

  <!-- PANELS -->
  <div class="container">

    <div class="panel">
      <div class="panel-title">Factum</div>
      <!-- zawartość -->
    </div>

    <div class="panel">
      <div class="panel-title">Panel 2</div>
    </div>

    <div class="panel">
      <div class="panel-title">Panel 3</div>
    </div>

    <div class="panel">
      <div class="panel-title">Panel 4</div>
    </div>

  </div>

  <script>
    function getPolishDayName(dayIndex) {
      const days = [
        "niedziela",
        "poniedziałek",
        "wtorek",
        "środa",
        "czwartek",
        "piątek",
        "sobota"
      ];
      return days[dayIndex];
    }

    function updateClock() {
      const now = new Date();

      const dayName = getPolishDayName(now.getDay());
      const day = String(now.getDate()).padStart(2, "0");
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = now.getFullYear();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      document.getElementById("date").innerText =
        `${dayName}, ${day}.${month}.${year}`;

      document.getElementById("time").innerText =
        `${hours}:${minutes}`;
    }

    updateClock();

    const now = new Date();
    const secondsToNextMinute = 60 - now.getSeconds();

    setTimeout(() => {
      updateClock();
      setInterval(updateClock, 60000);
    }, secondsToNextMinute * 1000);
  </script>

</body>
</html>
